<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Book Recommendation System</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<style>
    .text-white {
        color: white;
    }
</style>

<body style="background-color:black;">

<nav class="navbar" style="background-color: purple;">
    <p class="navbar-brand text-white">My book recommender</p>

    <ul class="nav">
        <li><a href="/">Home</a></li>
        <li><a href="/recommend">Recommendeds</a></li>
        <li><a>Contact</a></li>
    </ul>
</nav>

<div class="container">

    <h1 class="text-white">Recommend Books</h1>

    <form action="/recommend_books" method="post">
        <input name="User_input" type="text" class="form-control"><br>
        <input type="submit" class="btn btn-warning btn-lg">
    </form>

    {% if data %}

    <div class="row">

        {% for i in data %}
        <div class="col-md-3" style="margin-top:50px;">

            <div style="position:relative; width:100px;">

                <img src="{{ i[2] }}"
                     style="width:100px; height:150px; object-fit:cover; border:none;">

                <div style="
                    position:absolute;
                    bottom:0;
                    left:0;
                    width:100%;
                    background:rgba(0,0,0,0.6);
                    color:white;
                    font-size:10px;
                    padding:4px;
                    line-height:1.2;
                ">
                    <p style="margin:0;">{{ i[0] }}</p>
                    <p style="margin:0;">{{ i[1] }}</p>
                </div>

            </div>

        </div>
        {% endfor %}

    </div>

    {% endif %}

</div>

</body>
</html>
