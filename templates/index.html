<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Book Recommendation System</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<style>
    .text-white{
        color:white
    }
</style>


<body style="background-color:black;">
 <nav class="navbar" style="background-color: Purple ; padding: 15px;">

            <p class="navbar-brand">My book recommender </p>

            <ul class="nav navbar_nav"  style="display:flex; gap:20px; list-style:none;">
                <li><a href="/"> Home</a></li>
                <li><a href="/recommend">   Recommendeds</a></li>

            </ul>
     </nav>

<div class="Container">
   <div class="row">
            <div class="col-md-12">
                <h1 class="text-white"> Top 50 Books</h1>
                </div>

       {% for i in range(book_name|length)%} <div class="col-md-3" style="margin-top:50px;">

    <div style="position:relative; width:100px;">

        <img class="card-body"
        src="{{Image[i]}}"
style="width:100px; height:150px; object-fit:cover; border:none;">
<div style="
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    background:rgba(0,0,0,0.6);
    color:white;
    font-size:10px;
    padding:4px;
    line-height:1.2;
">
    <p style="margin:0;">{{ book_name[i] }}</p>
    <p style="margin:0;">{{ Author[i] }}</p>
    <p style="margin:0;">Votes - {{ Votes[i] }}</p>
    <p style="margin:0;">Rating - {{ rating[i] }}</p>
</div>



    </div></div>
       {% endfor %}

      </div>


</div>
</body>

</html>
